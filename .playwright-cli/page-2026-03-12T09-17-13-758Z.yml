      - heading "Laitse lossi ajalugu" [level=1] [ref=e19]
    - generic [ref=e23]:
      - paragraph [ref=e24]:
        - text: Laitse nimi ilmub ajaloo lehekülgedele esmakordselt juba XIII sajandi alguses. Taani ristisõdijad, kes 1219. aasta talvel Eestimaa põhjaosa vallutusretkedel liikusid, jõudsid veebruarikuu lõikava külmaga vaikusesse mähkunud külakesse, mida Henriku Liivimaa kroonikas tähistatakse nimega
        - emphasis [ref=e25]: Ladise
        - text: . Sõdamehed pidasid seal öömaja ja jätsid siis edasi, kuid kohanimi jäi kroonikasse igaveseks.
      - blockquote [ref=e26]:
        - paragraph [ref=e29]: «1219. aasta veebruaris jõudsid ristisõdijad Ladise-nimele külasse ja jäid sinna öömajale.»
        - generic [ref=e30]: Henriku Liivimaa kroonika
      - paragraph [ref=e33]: "Sajandeid kuulus see paik Ruila ordumõisale. Olud muutusid XVII sajandi alguses, kui Rootsi võimude kingitusena anti kogu Ruila valdus 1622. aastal Riia bürgermeistrile Johan Ulrichile. Tema soost kujuneski Laitse mõisaks: vanimad kindlad teated iseseisva mõisana pärinevad aastast 1637. Ulrichite perekond hoidis maad enda käes ligi kakssada aastat, kuni 1814. aastani, mil valdus päranes Mohrenschildtide suguvõsale."
      - paragraph [ref=e36]: "XIX sajandi teisel poolel vahetusid omanikud sagedasti. Mohrenschildtide järelt läks mõis Tallinna pastorite toetusfondile, siis suurtöösturile Alexander Eggersile ning pärastpoole Paul Heinrich von Dehni käsutusse. Muutus saabus 1883. aastal, kui Kose-Uuemõisalt pärit Natalie von Uexküll ostis Laitse oma pojale Woldemarile. Just see ost muutis kõike: Woldemar von Uexküll, noor ja kujutlusvõimeline aadlik, hakkas kavandama midagi, mida senini Laitse küplev maastik polnud näinud."
      - paragraph [ref=e37]: Umbes 1890. aastal valmis Woldemari nägemusest inspireeritud neogooti lossihoone — tornikeste, viilkatuse ja kunstipäraste detailidega ehitis, mis paistab juba kaugelt. See on romantiline loss, mida ehitas romantiline hing. Pärast sõjaväelist karjääri pööris Woldemar kirjanduse ja usulise müstika poole, ning tema sisemine maailm peegeldub hoone ülevas, unistavas ilmes. Kodu, mis sai lossiks; mõis, mis sai muinaslooliseks.
    - generic [ref=e40]:
      - generic:
        - img "Woldemar von Uexküll"
      - generic [ref=e41]:
        - heading "Woldemar von Uexküll" [level=2] [ref=e42]
        - generic [ref=e45]:
          - paragraph [ref=e46]: Parun Woldemar Reinhold Karl Alexander von Uexküll sündis 28. augustil 1860 Kose-Uuemõisas, vana baltisaksa aadliperekonna järglasena. Ta omandas hariduse Tallinna Toomkoolis ja hiljem Kuressaare gümnaasiumis, ning astus seejärel vabatahtlikuna Vene keisririigi ratsaväkke. Kaks aastat teenis ta Novorossiiskis, Põhja-Kaukaasia sõjas piirkonnas, enne kui otsustas sõjaväelise elu seljataha jätta.
          - paragraph [ref=e47]: Eestisse naastes ostis Woldemar Laitse mõisa ja abiellus 1883. aastal Prantsuse suursaadiku tütre Olga Marquis de Tallenay'ga. Kuid just isikliku elu keerulisus suunas noort parunit vaimsete otsingute teele. Abielu lahutati 1890ndatel aastatel, uus abielu 1899. aastal Martha von Ditmariga — need sõlmpunktid märkisid pööret, mille käigus Woldemar pöördus üha enam usu ja kirjanduse poole.
          - paragraph [ref=e48]: "Laitse-perioodil ehitas ta praeguse neogooti lossihoone, arendas põllumajandust ja pidas Nissi vallas kohtuniku ametit. Samuti tugevdas ta sidemeid rahvusvahelise evangeelse liikumisega: 1905. aastal esindas ta Baptistliku Maailmaliidu Londoni konverentsil Vene Baptistlikku Liitu ja valiti üheks asepresidendiks. Talle oli oluline ka kohalik kogukond: Laitsesse loodi tema toetusel pühapäevakool ja algkool."
          - paragraph [ref=e49]: Üks tema lähedasemaid kaaslasi oli arhitektuurihuviline Nõmme asutaja Nicolai von Glehn. Pole võimalik välistada, et Glehn avaldas mõju ka Laitse lossihoone kujunemisele — mõlemad mehed jagasid vaimustust gooti vormide ja romantiliste ideaalide vastu.
          - paragraph [ref=e50]: "1909. aastal müüs Woldemar Laitse mõisa: ainsale pojale, kes oli rüütelkonnast välja heidetud, ta seda pärandada ei saanud, tütar aga elas välismaal. Mõis läks Bremenite perekonna valdusse. Woldemar ise elas oma eluõhtul Austrias ja Šveitsis, kus ta jätkas vaimset otsingut ja kirjanduslikku loometööd. Ta suri 1945. aastal Baselis."
        - img [ref=e52]
