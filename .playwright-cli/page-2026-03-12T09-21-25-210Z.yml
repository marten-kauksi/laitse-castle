          - paragraph [ref=e76]: Esimese korruse salong on intiimne ja soe ruum, mille suured aknad avanevad lossi aeda ja ümbritsevale maastikule. Ideaalne väiksematele tähistamistele, kus iga külaline tunneb end erilisena.
          - paragraph [ref=e77]: Kuni 64 külalist, intiimne õhkkond. Salongi hubane atmosfäär sobib eriti hästi sünnipäevadeks, juubeliteks ja pere koosviibimisteks.
