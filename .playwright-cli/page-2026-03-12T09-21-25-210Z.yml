          - paragraph [ref=e67]: Lossi suurim ja võimsaim ruum, kus kõrged võlvlaed ja ajaloolised detailid loovad erakordse atmosfääri. Suur saal sobib nii suursugusteks banketipidudeks kui ka kontsertideks ja ettekanneteks.
          - paragraph [ref=e68]: Kuni 150 külalist teatristiilis, 100 piduliku banketi jaoks. Ruum, mis jätab mulje juba uksest sisse astudes.
