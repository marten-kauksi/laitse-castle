          - paragraph [ref=e86]: Suur aed sobib suurepäraselt suveüritusteks ja tseremooniateks. Pulmatseremoonia lossi aias, vastuvõtt terrassil — looduse ja ajaloo kooskõla, mida mujalt ei leia.
